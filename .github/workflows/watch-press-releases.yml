name: Watch Press Releases

on:
  schedule:
    - cron: "0 0 * * *" # 09:00 JST
  workflow_dispatch:

permissions:
  contents: write
  models: read

jobs:
  watch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run watcher
        env:
          GITHUB_TOKEN: ${{ github.token }}
          AI_SUMMARY_ENABLED: ${{ vars.AI_SUMMARY_ENABLED }}
          GITHUB_MODELS_API_URL: ${{ vars.GITHUB_MODELS_API_URL }}
          GITHUB_MODELS_MODEL: ${{ vars.GITHUB_MODELS_MODEL }}
        run: python scripts/watch_press_releases.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md data/seen.json docs/*.md
          git commit -m "Update press release watch" || exit 0
          git push
